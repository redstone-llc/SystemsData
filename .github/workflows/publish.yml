name: Publish with Gradle

on:
  push:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Publish with Gradle
        env:
          GRADLE_OPTS: "-Xmx2g -XX:+UseParallelGC -XX:MaxMetaspaceSize=384m"
          _JAVA_OPTIONS: "-Xmx4g"
        run: |
          ./gradlew publish \
          -PreleasesRepoUsername=${{ secrets.RELEASESREPOUSERNAME }} \
          -PreleasesRepoPassword=${{ secrets.RELEASESREPOPASSWORD }}
